# Pages project: melorga (melorga.pages.dev)
#
# Top-level keys (name, pages_build_output_dir, compatibility_*) MUST come
# before any [table] header in TOML — otherwise they're parsed as members
# of the preceding table and wrangler logs "missing pages_build_output_dir".
#
# ─── Secrets (set via Cloudflare dashboard or `wrangler pages secret put`) ───
#   GROQ_API_KEY             — Groq API key (server)
#   TURNSTILE_SECRET         — Cloudflare Turnstile server secret
#   SESSION_SECRET           — 48 random bytes for HMAC session-cookie signing
#   VISITOR_LOG_SALT         — 48 random bytes for HMAC IP hashing
#   VITE_FIREBASE_CONFIG     — Firebase config JSON (client; Vite-exposed)
#   VITE_TURNSTILE_SITEKEY   — Turnstile site key (client; Vite-exposed)
#
# Cloudflare Pages does NOT substitute ${VAR} placeholders in this file —
# the dashboard secrets are the source of truth at runtime. The [vars] block
# is intentionally absent to avoid confusion.
#
# ─── Test-only ───
# ⚠️  E2E_MODE enables a test-only auth bypass in +layout.server.ts (Layer 5).
#     It MUST NEVER be set on this Pages project. Playwright sets it only for
#     the local preview server.
#
# ─── Firebase plan ───
# 💰  Blaze (pay-as-you-go) as of 2026-05-21. STAY WITHIN FREE TIER. Only
#     firebase/auth is in use (≤50k MAU is free). Server-side ID-token
#     verification uses Google's free tokeninfo endpoint (Google OAuth API,
#     not Firebase) → consumes no Firebase quota. Do NOT add Firestore,
#     Storage, Cloud Functions, or Realtime DB without explicit owner
#     approval and a cost projection.

name = "melorga"
pages_build_output_dir = ".svelte-kit/cloudflare"
compatibility_date = "2024-09-23"
compatibility_flags = [ "nodejs_compat" ]

[[kv_namespaces]]
binding = "PROFILE_VECTORS"
id = "7c958fcfb13b44d491294373f0363330"
preview_id = "7c958fcfb13b44d491294373f0363330"

[[kv_namespaces]]
binding = "VISITOR_LOG"
id = "1ed65d30840d430cbfdc192432678ea0"
preview_id = "46824163c02b4d7b86c395e71df83e05"
