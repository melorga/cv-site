# Required secrets (set via `pnpm wrangler pages secret put <NAME>`):
#   SESSION_SECRET         — ≥32 random bytes for HMAC session signing
#   VISITOR_LOG_SALT       — ≥32 random bytes for IP hashing
#   TURNSTILE_SECRET       — Cloudflare Turnstile server secret (existing)
#   GROQ_API_KEY           — Groq API key (existing)
#
# ⚠️  E2E_MODE is a TEST-ONLY env var. It enables a test-only auth bypass in
#     +layout.server.ts (Layer 5). It MUST NEVER be set in production deploys.

[vars]
GROQ_API_KEY = "$GROQ_API_KEY"
TURNSTILE_SECRET = "$TURNSTILE_SECRET"
TURNSTILE_SITEKEY = "$TURNSTILE_SITEKEY"
KV_SECRET_ID = "$KV_SECRET_ID"
VISITOR_LOG_ID = "$VISITOR_LOG_ID"
VITE_FIREBASE_CONFIG = "$VITE_FIREBASE_CONFIG"

# Generated by Wrangler on Thu Jul 31 2025 07:13:52 GMT+0200 (Central European Summer Time)
name = "melorga"
pages_build_output_dir = ".svelte-kit/cloudflare"
compatibility_date = "2024-09-23"
compatibility_flags = [ "nodejs_compat" ]

[[kv_namespaces]]
binding = "PROFILE_VECTORS"
id = "${KV_SECRET_ID}"
preview_id = "${KV_SECRET_ID}"

# VISITOR_LOG namespace is provisioned via:
#   pnpm wrangler kv namespace create VISITOR_LOG
#   pnpm wrangler kv namespace create VISITOR_LOG --preview
# then paste the returned ids below (or use the KV_SECRET_ID-style env mapping
# for CI). Until provisioned, hooks.server.ts gracefully skips the per-IP cap
# and /api/auth/session skips the visitor-log write.
[[kv_namespaces]]
binding = "VISITOR_LOG"
id = "${VISITOR_LOG_ID}"
preview_id = "${VISITOR_LOG_ID}"

[env.production]
compatibility_flags = [ "nodejs_compat" ]

[[env.production.kv_namespaces]]
binding = "PROFILE_VECTORS"
id = "${KV_SECRET_ID}"
preview_id = "${KV_SECRET_ID}"

[[env.production.kv_namespaces]]
binding = "VISITOR_LOG"
id = "${VISITOR_LOG_ID}"
preview_id = "${VISITOR_LOG_ID}"
